server {
    listen 80;

    # Where the built React files live
    root /usr/share/nginx/html;
    index index.html;

    # This is the key line for React Router:
    # If a file isn't found, fall back to index.html
    # React Router then handles the URL on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }
}